<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Be Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
const { useState, useEffect } = React;
const AnimatePresence = ({ children }) => <>{children}</>;
const motion = new Proxy({}, { get: (_, tag) => ({ children, ...props }) => React.createElement(tag, props, children) });
const icon = (glyph) => ({ className = '' }) => <span className={className}>{glyph}</span>;
const Smartphone = icon('📱'); const Headphones = icon('🎧'); const Speaker = icon('🔊'); const MapPin = icon('📍');
const MessageCircle = icon('💬'); const ChevronRight = icon('›'); const ChevronLeft = icon('‹'); const Menu = icon('☰');
const X = icon('✕'); const Facebook = icon('f'); const Phone = icon('📞'); const ArrowUpRight = icon('↗'); const Zap = icon('⚡');
const Shield = icon('🛡️'); const Search = icon('🔍'); const ShoppingBag = icon('🛍️'); const Monitor = icon('🖥️');
const Laptop = icon('💻'); const Cpu = icon('🧠'); const Camera = icon('📷'); const Wifi = icon('📶'); const PenTool = icon('✎');
const BatteryCharging = icon('🔋'); const Wrench = icon('🔧'); const ChevronDown = icon('⌄'); const Truck = icon('🚚');
const RefreshCw = icon('⟳'); const HelpCircle = icon('❓'); const CheckCircle2 = icon('✅'); const User = icon('👤');
const Lock = icon('🔒'); const Mail = icon('✉️');

const BRANDS = ['Apple', 'Samsung', 'JBL', 'Anker', 'Baseus', 'Logitech', 'Spigen', 'Xiaomi', 'Joyroom'];
const PRODUCTS = [
  { id: 1, name: 'iPhone 15 Pro Max', category: 'Phones', price: 'Rs. 425,000', image: 'bg-zinc-800', badge: 'New', desc: 'Titanium. So strong. So light. So Pro.' },
  { id: 2, name: 'Samsung Galaxy S24 Ultra', category: 'Phones', price: 'Rs. 395,000', image: 'bg-zinc-900', badge: 'Popular', desc: 'Galaxy AI is here. Welcome to the era of mobile AI.' },
  { id: 3, name: 'JBL PartyBox 320', category: 'Audio', price: 'Rs. 185,000', image: 'bg-blue-900', badge: 'Featured', desc: 'Bring your party anywhere. Massive sound.' },
  { id: 4, name: 'Anker 737 Power Bank', category: 'Accessories', price: 'Rs. 45,000', image: 'bg-zinc-800', desc: '140W Two-Way Fast Charging.' },
  { id: 5, name: 'MacBook Air M3', category: 'Laptops', price: 'Rs. 380,000', image: 'bg-zinc-900', badge: 'New', desc: 'Lean. Mean. M3 machine.' },
  { id: 6, name: 'Custom Gaming Rig RTX 4070', category: 'Gaming', price: 'Rs. 650,000', image: 'bg-purple-900', desc: 'Built for extreme 1440p gaming.' },
  { id: 7, name: 'Spigen Ultra Hybrid Case', category: 'Accessories', price: 'Rs. 8,500', image: 'bg-zinc-800', desc: 'Clear protection that lasts.' },
  { id: 8, name: 'Logitech MX Master 3S', category: 'Accessories', price: 'Rs. 38,000', image: 'bg-zinc-900', desc: 'The ultimate precision mouse.' },
];
const HERO_SLIDES = [
  { id: 1, title: 'iPhone 15 Pro', subtitle: 'Titanium. Titanium. Titanium.', imageClass: 'from-zinc-800 to-black', textGradient: 'from-zinc-300 to-zinc-500', product: PRODUCTS[0] },
  { id: 2, title: 'JBL PartyBox 320', subtitle: 'Massive Sound. Epic Lights.', imageClass: 'from-blue-900 to-black', textGradient: 'from-blue-400 to-purple-500', product: PRODUCTS[2] },
  { id: 3, title: 'Galaxy S24 Ultra', subtitle: 'Galaxy AI is here.', imageClass: 'from-zinc-900 to-black', textGradient: 'from-zinc-100 to-zinc-400', product: PRODUCTS[1] }
];
const CATEGORIES = {
  "Mobile Accessories": ["Cases & Covers", "Screen Protectors", "Chargers", "Cables"],
  "Computing": ["Laptop Accessories", "Hubs & Adapters", "Storage", "Keyboards & Mice"],
  "Audio & Smart": ["Headphones", "Bluetooth Speakers", "Smart Watches", "Gaming Headsets"]
};

// ...code adapted from prompt...

const Navbar = ({ currentView, setView }) => {
  const [isOpen, setIsOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [showMegaMenu, setShowMegaMenu] = useState(false);
  useEffect(() => {
    const handleScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', handleScroll);
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);
  const navLinks = [{ id: 'home', label: 'Home' },{ id: 'shop', label: 'Store' },{ id: 'services', label: 'Repairs & Services' },{ id: 'contact', label: 'Contact' }];
  return <><nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled || showMegaMenu ? 'bg-black/80 backdrop-blur-xl border-b border-white/10' : 'bg-transparent'}`}><div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div className="flex justify-between items-center h-16"><div className="flex items-center cursor-pointer" onClick={() => setView('home')}><span className="text-xl font-semibold tracking-tight text-zinc-100">Be Mobile<span className="text-blue-500">.</span></span></div><div className="hidden md:flex space-x-8 items-center">{navLinks.map((item)=><button key={item.id} onClick={() => setView(item.id)} onMouseEnter={() => item.id === 'shop' ? setShowMegaMenu(true) : setShowMegaMenu(false)} className={`text-xs tracking-wide font-medium transition-colors ${currentView === item.id ? 'text-white' : 'text-zinc-400 hover:text-zinc-100'}`}>{item.label}</button>)}</div><div className="hidden md:flex items-center space-x-6"><Search className="h-4 w-4 text-zinc-400" /><button onClick={() => setView('account')} className="text-zinc-400 hover:text-white transition-colors"><User className="h-4 w-4" /></button></div><div className="md:hidden flex items-center space-x-4"><button onClick={() => setIsOpen(!isOpen)} className="text-zinc-100">{isOpen ? <X className="h-5 w-5" /> : <Menu className="h-5 w-5" />}</button></div></div></div></nav>{isOpen && <div className="fixed inset-0 z-40 bg-black/95 backdrop-blur-3xl pt-20"><div className="flex flex-col px-6 py-8 space-y-6 h-full overflow-y-auto">{navLinks.map((item) => <button key={item.id} onClick={() => { setView(item.id); setIsOpen(false); }} className="text-3xl font-semibold text-zinc-100 text-left border-b border-white/5 pb-4">{item.label}</button>)}</div></div>}</>
};
const HeroSlideshow = ({ setView, onProductClick }) => { const [current, setCurrent] = useState(0); useEffect(() => {const timer = setInterval(() => setCurrent((prev) => (prev + 1) % HERO_SLIDES.length), 6000); return () => clearInterval(timer);}, []); return <section className="relative min-h-[90vh] flex flex-col items-center justify-center overflow-hidden bg-black pt-16"><div className="max-w-7xl mx-auto px-4 relative z-10 w-full flex flex-col items-center text-center"><h1 className={`text-6xl md:text-8xl lg:text-9xl font-semibold tracking-tighter leading-none mb-6 text-transparent bg-clip-text bg-gradient-to-r ${HERO_SLIDES[current].textGradient}`}>{HERO_SLIDES[current].title}</h1><p className="text-xl md:text-3xl text-zinc-100 font-medium tracking-tight mb-8">{HERO_SLIDES[current].subtitle}</p><div className="flex flex-col sm:flex-row items-center justify-center gap-4"><button onClick={() => onProductClick(HERO_SLIDES[current].product)} className="w-full sm:w-auto bg-white text-black px-8 py-3 rounded-full font-semibold">Buy Now</button><button onClick={() => setView('shop')} className="w-full sm:w-auto bg-zinc-900 border border-zinc-800 text-zinc-100 px-8 py-3 rounded-full font-semibold">Explore Store</button></div></div></section>; };
const HomeView = ({ setView, onProductClick }) => <div><HeroSlideshow setView={setView} onProductClick={onProductClick} /><section className="py-16 bg-zinc-950 border-y border-zinc-900"><div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><h3 className="text-xs font-bold tracking-widest text-zinc-500 uppercase mb-8 text-center">Shop Premium Brands</h3><div className="flex flex-wrap justify-center items-center gap-8 md:gap-16 opacity-60">{BRANDS.map((brand) => <div key={brand} className="text-xl md:text-2xl font-bold tracking-tight text-zinc-400">{brand}</div>)}</div></div></section></div>;
const ShopView = ({ onProductClick }) => <div className="pt-32 pb-20 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><h1 className="text-5xl font-semibold tracking-tight text-white mb-10">Store.</h1><div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">{PRODUCTS.map((prod)=><div key={prod.id} onClick={() => onProductClick(prod)} className="bg-zinc-900/50 border border-zinc-800 rounded-3xl p-6 cursor-pointer"><div className={`w-full aspect-square ${prod.image} rounded-2xl mb-6`}></div><div className="text-xs text-blue-500 font-medium mb-2">{prod.category}</div><h3 className="text-lg font-semibold text-white mb-2 leading-tight">{prod.name}</h3><p className="text-zinc-300 font-medium">{prod.price}</p></div>)}</div></div>;
const ProductDetailView = ({ product, setView }) => !product ? null : <div className="pt-32 pb-20 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><button onClick={() => setView('shop')} className="text-zinc-400 hover:text-white flex items-center gap-2 mb-8 text-sm">Back to Store</button><h1 className="text-4xl md:text-5xl font-semibold tracking-tight text-white mb-4">{product.name}</h1><p className="text-xl text-zinc-400 mb-6">{product.desc}</p><p className="text-3xl text-zinc-100 font-light mb-8">{product.price}</p></div>;
const ServicesView = () => <div className="pt-32 pb-20 max-w-7xl mx-auto px-4"><h1 className="text-5xl font-semibold tracking-tighter text-white mb-6">Expert Repairs.</h1></div>;
const ContactView = () => <div className="pt-32 pb-20 max-w-7xl mx-auto px-4"><h1 className="text-5xl font-semibold tracking-tight text-white mb-6">Get in touch.</h1></div>;
const AccountView = () => <div className="pt-32 pb-20 max-w-7xl mx-auto px-4"><h1 className="text-4xl text-white">My Account</h1></div>;
const Footer = ({ setView }) => <footer className="bg-zinc-950 pt-12 pb-10 border-t border-zinc-900"><div className="max-w-7xl mx-auto px-4"><p className="text-zinc-600 text-xs font-medium">© {new Date().getFullYear()} Be Mobile Pannala. All rights reserved.</p></div></footer>;

function App() {
  const [currentView, setCurrentView] = useState('home');
  const [selectedProduct, setSelectedProduct] = useState(null);
  useEffect(() => { window.scrollTo(0, 0); }, [currentView]);
  const handleProductClick = (product) => { setSelectedProduct(product); setCurrentView('productDetail'); };
  const renderView = () => {
    switch (currentView) {
      case 'home': return <HomeView setView={setCurrentView} onProductClick={handleProductClick} />;
      case 'shop': return <ShopView onProductClick={handleProductClick} />;
      case 'productDetail': return <ProductDetailView product={selectedProduct} setView={setCurrentView} />;
      case 'services': return <ServicesView />;
      case 'contact': return <ContactView />;
      case 'account': return <AccountView />;
      default: return <HomeView setView={setCurrentView} onProductClick={handleProductClick} />;
    }
  };
  return <div className="min-h-screen bg-black text-zinc-100 font-sans selection:bg-blue-500/30 overflow-x-hidden"><Navbar currentView={currentView} setView={setCurrentView} />{renderView()}<Footer setView={setCurrentView} /></div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
